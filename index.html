<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="AXION PRO MAX - Anti-Gravity Productivity Suite">
  <meta name="theme-color" content="#7c3aed">
  <title>AXION — Anti-Gravity Productivity Suite</title>
  
  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%237c3aed' width='192' height='192' rx='32'/><text x='96' y='130' font-size='100' text-anchor='middle' fill='white' font-family='system-ui'>A</text></svg>">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%237c3aed' width='192' height='192' rx='32'/><text x='96' y='130' font-size='100' text-anchor='middle' fill='white' font-family='system-ui'>A</text></svg>">
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@400;600;700&display=swap" rel="stylesheet">
  
  <!-- Styles -->
  <link rel="stylesheet" href="css/style.css">
  
  <style>
    .intro-container {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    
    .intro-logo {
      font-family: 'Sora', sans-serif;
      font-size: 4rem;
      font-weight: 700;
      background: linear-gradient(135deg, #7c3aed 0%, #06b6d4 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 1rem;
      animation: float 6s ease-in-out infinite;
    }
    
    .intro-tagline {
      font-size: 1.25rem;
      color: rgba(255, 255, 255, 0.7);
      margin-bottom: 3rem;
    }
    
    .intro-actions {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    
    .intro-features {
      display: flex;
      gap: 2rem;
      margin-top: 3rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    
    .intro-feature {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: rgba(255, 255, 255, 0.5);
      font-size: 0.875rem;
    }
    
    .intro-feature-icon {
      width: 24px;
      height: 24px;
      background: rgba(124, 58, 237, 0.2);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>
<body data-page="intro">
  
  <!-- Splash Screen -->
  <div class="splash-screen" id="splash-screen">
    <div class="splash-logo">AXION</div>
    <div class="splash-tagline">Anti-Gravity Productivity Suite</div>
    <div class="splash-loader">
      <div class="splash-loader-bar"></div>
    </div>
  </div>
  
  <!-- Main Content -->
  <div class="intro-container" id="main-content" style="display: none;">
    <h1 class="intro-logo">AXION</h1>
    <p class="intro-tagline">Experience anti-gravity productivity</p>
    
    <div class="intro-actions">
      <a href="dashboard.html" class="btn btn-primary btn-lg">
        Get Started
      </a>
      <button class="btn btn-secondary btn-lg" onclick="document.getElementById('features').scrollIntoView({behavior: 'smooth'})">
        Learn More
      </button>
    </div>
    
    <div class="intro-features" id="features">
      <div class="intro-feature">
        <div class="intro-feature-icon">⚡</div>
        <span>PWA Installable</span>
      </div>
      <div class="intro-feature">
        <div class="intro-feature-icon">🎯</div>
        <span>Deep Focus Mode</span>
      </div>
      <div class="intro-feature">
        <div class="intro-feature-icon">📊</div>
        <span>Analytics</span>
      </div>
      <div class="intro-feature">
        <div class="intro-feature-icon">📱</div>
        <span>Offline Support</span>
      </div>
    </div>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toast-container"></div>

  <!-- Scripts -->
  <script src="js/core.js"></script>
  
  <script>
    // Custom intro animation
    document.addEventListener('DOMContentLoaded', () => {
      setTimeout(() => {
        const splash = document.getElementById('splash-screen');
        const main = document.getElementById('main-content');
        
        if (splash) splash.style.opacity = '0';
        setTimeout(() => {
          if (splash) splash.style.display = 'none';
          if (main) {
            main.style.display = 'flex';
            main.classList.add('fade-in');
          }
        }, 500);
      }, 2500);
    });
  </script>
</body>
</html>
