<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="AXION PRO MAX - Focus Mode">
  <meta name="theme-color" content="#7c3aed">
  <title>Focus Mode — AXION PRO MAX</title>
  
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%237c3aed' width='192' height='192' rx='32'/><text x='96' y='130' font-size='100' text-anchor='middle' fill='white' font-family='system-ui'>A</text></svg>">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@400;600;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="style.css">
  
  <style>
    .focus-container {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }
    
    .focus-timer-wrapper {
      position: relative;
      width: 320px;
      height: 320px;
      margin-bottom: 2rem;
    }
    
    .focus-timer-circle {
      width: 100%;
      height: 100%;
      transform: rotate(-90deg);
    }
    
    .focus-timer-bg {
      fill: none;
      stroke: #1a1a1a;
      stroke-width: 8;
    }
    
    .focus-timer-progress {
      fill: none;
      stroke: url(#focusGradient);
      stroke-width: 8;
      stroke-linecap: round;
      stroke-dasharray: 880;
      stroke-dashoffset: 0;
      transition: stroke-dashoffset 1s ease;
    }
    
    .focus-timer-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }
    
    .focus-duration-presets {
      display: flex;
      gap: 0.5rem;
      justify-content: center;
      margin-bottom: 2rem;
    }
    
    .focus-duration-preset {
      padding: 0.5rem 1rem;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      color: rgba(255, 255, 255, 0.7);
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .focus-duration-preset:hover,
    .focus-duration-preset.active {
      background: rgba(124, 58, 237, 0.2);
      border-color: #7c3aed;
      color: white;
    }
    
    .focus-task-selector {
      margin-top: 1rem;
    }
    
    .focus-task-item {
      padding: 0.75rem 1rem;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 8px;
      margin-bottom: 0.5rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .focus-task-item:hover {
      background: rgba(124, 58, 237, 0.1);
      border-color: rgba(124, 58, 237, 0.3);
    }
  </style>
</head>
<body data-page="focus">
  
  <div class="focus-container" id="focus-container">
    
    <div class="focus-duration-presets">
      <button class="focus-duration-preset" data-minutes="15">15 min</button>
      <button class="focus-duration-preset active" data-minutes="25">25 min</button>
      <button class="focus-duration-preset" data-minutes="45">45 min</button>
      <button class="focus-duration-preset" data-minutes="60">60 min</button>
    </div>
    
    <div class="focus-timer-wrapper">
      <svg class="focus-timer-circle" viewBox="0 0 300 300">
        <defs>
          <linearGradient id="focusGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#7c3aed"/>
            <stop offset="100%" stop-color="#06b6d4"/>
          </linearGradient>
        </defs>
        <circle class="focus-timer-bg" cx="150" cy="150" r="140"/>
        <circle class="focus-timer-progress" id="focus-progress" cx="150" cy="150" r="140"/>
      </svg>
      <div class="focus-timer-text">
        <div class="focus-timer" id="focus-timer">25:00</div>
      </div>
    </div>
    
    <h2 class="focus-task-name" id="focus-task-name">No task selected</h2>
    
    <div class="focus-controls flex gap-lg mt-lg">
      <button class="btn btn-primary btn-lg" id="focus-start-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
          <polygon points="5 3 19 12 5 21 5 3"/>
        </svg>
        Start
      </button>
      <button class="btn btn-secondary btn-lg hidden" id="focus-pause-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
          <rect x="6" y="4" width="4" height="16"/>
          <rect x="14" y="4" width="4" height="16"/>
        </svg>
        Pause
      </button>
      <button class="btn btn-ghost" id="focus-reset-btn">Reset</button>
    </div>
    
    <div class="focus-task-selector mt-lg">
      <button class="btn btn-secondary" id="select-task-btn">
        Select a Task
      </button>
    </div>
    
    <div class="mt-lg">
      <span class="text-secondary">Sessions completed: </span>
      <span class="badge badge-primary" id="session-count">0</span>
    </div>
    
    <div class="mt-xl">
      <button class="btn btn-ghost" id="focus-exit-btn">
        Exit Focus Mode
      </button>
    </div>
    
    <div class="mt-lg text-secondary" style="font-size: 0.875rem;">
      <p>Press <kbd>Space</kbd> to start/pause • Press <kbd>ESC</kbd> to exit</p>
    </div>
    
  </div>

  <!-- Task Selector Modal -->
  <div class="modal-overlay" id="task-selector-modal">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title">Select a Task</h3>
        <button class="modal-close" onclick="Modal.close('task-selector-modal')" title="Close modal">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 6L6 18M6 6l12 12"/>
          </svg>
        </button>
      </div>
      <div class="modal-body" id="task-selector-list">
        <!-- Dynamically rendered -->
      </div>
    </div>
  </div>

  <div class="toast-container" id="toast-container"></div>

  <script src="core.js"></script>
  <script src="focus.js"></script>
</body>
</html>
