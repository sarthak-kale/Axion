<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="AXION PRO MAX - Notes">
  <meta name="theme-color" content="#7c3aed">
  <title>Notes — AXION PRO MAX</title>
  
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%237c3aed' width='192' height='192' rx='32'/><text x='96' y='130' font-size='100' text-anchor='middle' fill='white' font-family='system-ui'>A</text></svg>">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@400;600;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="css/style.css">
  
  <style>
    .notes-layout {
      display: grid;
      grid-template-columns: 300px 1fr;
      min-height: calc(100vh - 64px);
    }
    
    .notes-sidebar {
      background: #111111;
      border-right: 1px solid rgba(255, 255, 255, 0.05);
      display: flex;
      flex-direction: column;
    }
    
    .notes-sidebar-header {
      padding: 1rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }
    
    .notes-search {
      width: 100%;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      padding: 0.5rem 1rem;
      color: white;
      font-size: 0.875rem;
    }
    
    .notes-search:focus {
      outline: none;
      border-color: #7c3aed;
    }
    
    .notes-list {
      flex: 1;
      overflow-y: auto;
      padding: 0.5rem;
    }
    
    .note-item {
      padding: 1rem;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 0.5rem;
    }
    
    .note-item:hover {
      background: rgba(255, 255, 255, 0.03);
    }
    
    .note-item.selected {
      background: rgba(124, 58, 237, 0.1);
      border: 1px solid rgba(124, 58, 237, 0.3);
    }
    
    .note-item-title {
      font-weight: 600;
      margin-bottom: 0.25rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    
    .note-item-preview {
      font-size: 0.75rem;
      color: rgba(255, 255, 255, 0.5);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    
    .note-item-meta {
      font-size: 0.75rem;
      color: rgba(255, 255, 255, 0.3);
      margin-top: 0.5rem;
    }
    
    .notes-editor {
      display: flex;
      flex-direction: column;
      padding: 1.5rem;
    }
    
    .note-title-input {
      background: transparent;
      border: none;
      font-size: 1.5rem;
      font-weight: 700;
      color: white;
      margin-bottom: 1rem;
      font-family: 'Sora', sans-serif;
    }
    
    .note-title-input:focus {
      outline: none;
    }
    
    .note-title-input::placeholder {
      color: rgba(255, 255, 255, 0.3);
    }
    
    .note-content-input {
      flex: 1;
      background: transparent;
      border: none;
      font-size: 1rem;
      color: rgba(255, 255, 255, 0.8);
      resize: none;
      font-family: 'Inter', sans-serif;
      line-height: 1.8;
    }
    
    .note-content-input:focus {
      outline: none;
    }
    
    .note-content-input::placeholder {
      color: rgba(255, 255, 255, 0.3);
    }
    
    .note-footer {
      padding-top: 1rem;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: rgba(255, 255, 255, 0.3);
      font-size: 0.75rem;
    }
    
    @media (max-width: 768px) {
      .notes-layout {
        grid-template-columns: 1fr;
      }
      
      .notes-sidebar {
        display: none;
      }
    }
  </style>
</head>
<body data-page="notes">
  
  <div class="splash-screen" id="splash-screen">
    <div class="splash-logo">AXION</div>
    <div class="splash-tagline">Anti-Gravity Productivity Suite</div>
    <div class="splash-loader">
      <div class="splash-loader-bar"></div>
    </div>
  </div>

  <div class="app-container">
    
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <div class="logo-icon">A</div>
          <span class="logo-text">AXION</span>
        </div>
        <button class="sidebar-toggle" onclick="document.querySelector('.sidebar').classList.toggle('collapsed')" title="Toggle sidebar">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 12h18M3 6h18M3 18h18"/>
          </svg>
        </button>
      </div>
      
      <nav class="sidebar-nav">
        <div class="nav-section">
          <div class="nav-section-title">Main</div>
          <a href="dashboard.html" class="nav-item">
            <div class="nav-item-icon">📊</div>
            <span class="nav-item-text">Dashboard</span>
          </a>
          <a href="tasks.html" class="nav-item">
            <div class="nav-item-icon">✅</div>
            <span class="nav-item-text">Tasks</span>
          </a>
          <a href="calendar.html" class="nav-item">
            <div class="nav-item-icon">📅</div>
            <span class="nav-item-text">Calendar</span>
          </a>
          <a href="habits.html" class="nav-item">
            <div class="nav-item-icon">🎯</div>
            <span class="nav-item-text">Habits</span>
          </a>
        </div>
        
        <div class="nav-section">
          <div class="nav-section-title">Tools</div>
          <a href="focus.html" class="nav-item">
            <div class="nav-item-icon">⚡</div>
            <span class="nav-item-text">Focus Mode</span>
          </a>
          <a href="notes.html" class="nav-item active">
            <div class="nav-item-icon">📝</div>
            <span class="nav-item-text">Notes</span>
          </a>
          <a href="analytics.html" class="nav-item">
            <div class="nav-item-icon">📈</div>
            <span class="nav-item-text">Analytics</span>
          </a>
        </div>
        
        <div class="nav-section">
          <div class="nav-section-title">System</div>
          <a href="settings.html" class="nav-item">
            <div class="nav-item-icon">⚙️</div>
            <span class="nav-item-text">Settings</span>
          </a>
        </div>
      </nav>
    </aside>
    
    <main class="main-content">
      
      <header class="header">
        <div class="header-left">
          <h1 class="header-title">Notes</h1>
        </div>
        
        <div class="header-right">
          <button class="btn btn-primary" id="add-note-btn">
            <span>+</span> New Note
          </button>
        </div>
      </header>
      
      <div class="notes-layout">
        
        <!-- Notes Sidebar -->
        <div class="notes-sidebar">
          <div class="notes-sidebar-header">
            <input type="text" class="notes-search" id="note-search" placeholder="Search notes...">
          </div>
          <div class="notes-list" id="note-list">
            <!-- Dynamically rendered -->
          </div>
        </div>
        
        <!-- Notes Editor -->
        <div class="notes-editor" id="note-editor">
          <!-- Dynamically rendered -->
        </div>
        
      </div>
    </main>
  </div>

  <div class="install-banner" id="install-banner">
    <div class="install-banner-icon">📲</div>
    <div class="install-banner-text">
      <div class="install-banner-title">Install AXION</div>
      <div class="install-banner-subtitle">Add to home screen for the full experience</div>
    </div>
    <div class="install-banner-actions">
      <button class="btn btn-ghost btn-sm" onclick="InstallBanner.hide()">Dismiss</button>
      <button class="btn btn-primary btn-sm" onclick="InstallBanner.install()">Install</button>
    </div>
  </div>

  <div class="toast-container" id="toast-container"></div>

  <script src="js/core.js"></script>
  <script src="js/notes.js"></script>
</body>
</html>
